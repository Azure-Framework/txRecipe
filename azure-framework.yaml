  - action: download_file
    url: https://github.com/TomGrobbe/vMenu/releases/latest/download/vMenu.zip
    path: ./tmp/files/vMenu.zip
  - action: unzip
    src: ./tmp/files/vMenu.zip
    dest: ./resources/[standalone]/vMenu
  - action: query_database
    file: ./resources/[azure]/Az-Framework/import.sql
  - action: write_file
    file: ./server.cfg
    data: |
      {{serverEndpoints}}
      sv_scriptHookAllowed 0
      sv_maxclients {{maxClients}}
      sv_enforceGameBuild 3570
      set onesync on
      sets locale "en-US"
      sets tags "roleplay, az-framework, vmenu, public, leo, civilian, jobs, economy, lore-friendly, new-player-friendly"
      sets Framework "Az-Framework"
      sets framework "Az-Framework"
      sv_hostname "{{serverName}} | Az-Framework 2.0"
      sets sv_projectName "{{serverName}}"
      sets sv_projectDesc "Az-Framework 2.0 server base with core modules, bridges, inventory support, public-safety resources, jobs, and vMenu compatibility."
      sv_endpointPrivacy true
      sv_licenseKey "{{svLicense}}"
      set steam_webApiKey "none"
      set mysql_connection_string "{{dbConnectionString}}"
      set DISCORD_BOT_TOKEN ""
      set DISCORD_WEBHOOK_URL ""
      set DISCORD_GUILD_ID ""
      set resources_useSystemChat true
      setr qb_locale "en"
      setr inventory:framework "az"
      setr inventory:accounts ["money"]
      setr inventory:azframeworkmoney 1
      setr inventory:azdebug 0
      setr inventory:keys ["F2", "K", "TAB"]
      setr inventory:slots 50
      setr inventory:weight 30000
      setr inventory:dropslots 50
      setr inventory:dropweight 30000
      setr inventory:imagepath "nui://ox_inventory/web/images"
      setr inventory:target true
      setr inventory:nativeweaponwheel 1
      setr inventory:weaponwheel 1
      setr inventory:disableweaponitems 1
      setr inventory:disableweapons 1
      setr inventory:weaponmismatch false
      setr inventory:weaponanims false
      setr inventory:weaponnotify false
      setr inventory:suppresspickups 0
      set inventory:versioncheck true
      set inventory:loglevel 1
      setr vmenu_qbcore_bridge_enable 0
      setr vmenu_az_bridge_enable 1
      setr fivem-appearance:customization 1
      add_ace group.admin command allow
      add_ace group.admin command.quit deny
      {{addPrincipalsMaster}}
      add_ace group.admin ox_inventory.oxconfig allow
      add_ace group.admin command.oxconfig allow
      add_ace group.admin command.oxconfigrestart allow
      add_ace resource.ox_inventory command.restart allow
      add_ace group.admin azadmin.use allow
      add_ace group.admin az_mdt.open allow
      add_ace group.admin az_mdt.admin allow
      add_ace group.admin az_mdt.civ allow
      add_ace group.admin az_mdt.dmv allow
      add_ace group.admin az_mdt.leochat allow
      add_ace group.admin az_mdt.supervisor allow
      exec @vMenu/config/permissions.cfg
      ensure mapmanager
      ensure spawnmanager
      ensure sessionmanager
      ensure basic-gamemode
      ensure hardcap
      ensure rconlog
      ensure baseevents
      ensure oxmysql
      ensure ox_lib
      ensure ox_target
      ensure screenshot-basic
      ensure MugShotBase64
      ensure glitch-minigames
      ensure pma-voice
      ensure Az-Framework
      ensure qb-core
      ensure qb-inventory
      ensure qb-target
      ensure es_extended
      ensure ND_Core
      ensure vMenu
